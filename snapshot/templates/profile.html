<!DOCTYPE html>
<html>
<head>
    <title>Profile | SnapCatalog AI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <a href="index.html" class="logo">SNAPCATALOG</a>
        <nav>
            <a href="inventory.html">Inventory</a>
            <a href="upload.html">Upload</a>
            <a href="login.html">Login</a>
            <a href="signup.html" class="btn btn-primary">Get Started</a>
        </nav>
    </header>

    <div class="container" style="display: grid; grid-template-columns: 300px 1fr; gap: 40px;">
        <div class="card" style="text-align: center;">
            <div style="width: 100px; height: 100px; background: var(--primary); border-radius: 50%; margin: 0 auto 1.5rem;"></div>
            <h3>Alex Rivera</h3>
            <p style="color: var(--secondary);">Manager</p>
        </div>
        <div class="card">
            <h2>Account Details</h2>
            <div style="margin-top: 2rem; display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div><label>First Name</label><p>Alex</p></div>
                <div><label>Last Name</label><p>Rivera</p></div>
                <div><label>Company</label><p>Global Logistics</p></div>
            </div>
            <button class="btn btn-primary" style="margin-top: 2rem;">Edit Details</button>
        </div>
    </div>

    <footer>
        <div class="footer-grid">
            <div><h3>SNAPCATALOG AI</h3><p>Next-gen logistics.</p></div>
            <div><h4>Product</h4><p>Pricing<br>API</p></div>
            <div><h4>Support</h4><p>Contact<br>Privacy</p></div>
        </div>
        <div class="footer-bottom">© 2026 SnapCatalog AI.</div>
    </footer>
</body>
</html>
